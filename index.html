<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="持仓看板">
    <title>私人持仓推演</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --red-up: #ff3b30; 
            --green-down: #34c759; 
            --blue-btn: #007aff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* 核心优化：锁定外壳，使用 100dvh 完美贴合 iPhone 16 Pro Max 屏幕，消除底部白边 */
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100dvh; 
            overflow: hidden; /* 禁止整体滑动，消除跳动感 */
            background-color: var(--bg-color); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; 
            color: var(--text-main); 
            display: flex;
            flex-direction: column;
        }

        .header-spacer { height: env(safe-area-inset-top); flex-shrink: 0; }

        /* 内容区独立顺滑滚动 */
        .scroll-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
            /* 底部留出小白条的安全距离 */
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 16px; 
            box-shadow: 0 4px 24px rgba(0,0,0,0.04); 
        }

        h2 { margin: 0 0 16px 0; font-size: 18px; font-weight: 600; letter-spacing: -0.5px; display: flex; align-items: center; }

        .input-group { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid #e5e5ea; }
        .input-group:last-child { border-bottom: none; padding-bottom: 0; }
        .input-group label { font-size: 15px; color: var(--text-main); font-weight: 500;}
        .input-group input { width: 140px; padding: 8px 12px; background: #f2f2f7; border: none; border-radius: 8px; text-align: right; font-size: 16px; font-weight: 600; outline: none; }
        .input-group input:focus { background: #e5e5ea; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box { background: rgba(242, 242, 247, 0.6); padding: 16px; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; }
        .stat-box .label { font-size: 13px; color: var(--text-muted); font-weight: 500; margin-bottom: 4px; }
        .stat-box .value { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; transition: color 0.3s ease; }

        .text-red { color: var(--red-up); }
        .text-green { color: var(--green-down); }

        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 8px; text-align: right; }
        th { color: var(--text-muted); font-weight: 500; padding-bottom: 12px; border-bottom: 0.5px solid #e5e5ea; font-size: 12px;}
        td { padding: 12px 0; border-bottom: 0.5px solid #f2f2f7; font-variant-numeric: tabular-nums; }
        tr:last-child td { border-bottom: none; }
        th:first-child, td:first-child { text-align: left; }

        button { width: 100%; background: var(--blue-btn); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 600; margin-bottom: 16px; cursor: pointer; transition: opacity 0.2s; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); }
        button:active { opacity: 0.7; }
        
        .rate-badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 14px; background: #f2f2f7; }
        .live-dot { width: 8px; height: 8px; background-color: var(--green-down); border-radius: 50%; margin-left: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(52, 199, 89, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); } }
    </style>
</head>
<body>
    <div class="header-spacer"></div>

    <div class="scroll-container">
        <div class="card">
            <h2>⚙️ 参数设置</h2>
            <div class="input-group">
                <label>股票代码</label>
                <input type="text" id="stockCode" value="sh600481" placeholder="例如 sh600481">
            </div>
            <div class="input-group">
                <label>初始总成本</label>
                <input type="number" id="cost" value="385000">
            </div>
            <div class="input-group">
                <label>持仓股数</label>
                <input type="number" id="shares" value="26200">
            </div>
            <div class="input-group">
                <label>预期日涨幅(%)</label>
                <input type="number" id="dailyGrowth" value="10" step="0.1">
            </div>
        </div>

        <button id="refreshBtn" onclick="refreshData(false)">⚡️ 手动强制刷新</button>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="margin: 0;">📊 实时看板 <div class="live-dot" title="实时同步中"></div></h2>
                <div id="profitRate" class="rate-badge">--</div>
            </div>
            
            <div class="grid-2">
                <div class="stat-box">
                    <div class="label">最新股价</div>
                    <div class="value" id="currentPrice">--</div>
                </div>
                <div class="stat-box">
                    <div class="label">当前市值</div>
                    <div class="value" id="marketValue">--</div>
                </div>
                <div class="stat-box">
                    <div class="label">回本股价</div>
                    <div class="value" id="breakevenPrice">--</div>
                </div>
                <div class="stat-box">
                    <div class="label">浮动盈亏</div>
                    <div class="value" id="profit">--</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📈 T+10 预期推演</h2>
            <table>
                <thead>
                    <tr>
                        <th>交易日</th>
                        <th>预期股价</th>
                        <th>预期市值</th>
                        <th>单日浮动</th>
                    </tr>
                </thead>
                <tbody id="projectionTable">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function loadSavedParams() {
            const saved = localStorage.getItem('stockAppParams');
            if (saved) {
                const data = JSON.parse(saved);
                if (data.code) document.getElementById('stockCode').value = data.code;
                if (data.cost) document.getElementById('cost').value = data.cost;
                if (data.shares) document.getElementById('shares').value = data.shares;
                if (data.growth) document.getElementById('dailyGrowth').value = data.growth;
            }
        }

        function saveParams() {
            const params = {
                code: document.getElementById('stockCode').value.trim(),
                cost: document.getElementById('cost').value,
                shares: document.getElementById('shares').value,
                growth: document.getElementById('dailyGrowth').value
            };
            localStorage.setItem('stockAppParams', JSON.stringify(params));
            return params;
        }

        // 加入了 gbk 编码修复，防止极少数情况下解析接口出错
        function fetchStockData(code) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.charset = 'gbk';
                script.src = `https://qt.gtimg.cn/q=${code}&t=${new Date().getTime()}`;
                script.onload = () => {
                    const dataStr = window[`v_${code}`];
                    if (dataStr) {
                        const parts = dataStr.split('~');
                        resolve(parseFloat(parts[3])); 
                    } else {
                        reject('未能获取数据');
                    }
                    document.head.removeChild(script);
                };
                script.onerror = () => reject('网络请求失败');
                document.head.appendChild(script);
            });
        }

        function formatNum(num) {
            return Number(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getColorClass(value) {
            if (value > 0) return 'text-red';
            if (value < 0) return 'text-green';
            return '';
        }

        async function refreshData(isAuto = true) {
            const btn = document.getElementById('refreshBtn');
            if (!isAuto) {
                btn.innerText = "⏳ 正在获取...";
                btn.style.opacity = "0.7";
            }

            const params = saveParams(); 
            const cost = parseFloat(params.cost);
            const shares = parseFloat(params.shares);
            const growthRate = parseFloat(params.growth) / 100;

            try {
                const realPrice = await fetchStockData(params.code);
                
                const marketValue = realPrice * shares;
                const profit = marketValue - cost;
                const profitRate = (profit / cost) * 100;
                const breakevenPrice = cost / shares;

                document.getElementById('currentPrice').innerText = realPrice.toFixed(2);
                document.getElementById('breakevenPrice').innerText = breakevenPrice.toFixed(2);
                document.getElementById('marketValue').innerText = formatNum(marketValue);
                
                const profitEl = document.getElementById('profit');
                profitEl.innerText = (profit > 0 ? '+' : '') + formatNum(profit);
                profitEl.className = 'value ' + getColorClass(profit);
                
                const rateEl = document.getElementById('profitRate');
                rateEl.innerText = (profitRate > 0 ? '+' : '') + profitRate.toFixed(2) + '%';
                rateEl.className = 'rate-badge ' + getColorClass(profitRate);
                if(profitRate > 0) { rateEl.style.backgroundColor = 'rgba(255, 59, 48, 0.1)'; }
                else if(profitRate < 0) { rateEl.style.backgroundColor = 'rgba(52, 199, 89, 0.1)'; }

                const tbody = document.getElementById('projectionTable');
                tbody.innerHTML = ''; 
                
                let currentProjPrice = realPrice;
                for (let i = 1; i <= 10; i++) {
                    let prevValue = currentProjPrice * shares;
                    if (i > 1) { currentProjPrice = currentProjPrice * (1 + growthRate); }
                    
                    let currentValue = currentProjPrice * shares;
                    let dailyProfit = i === 1 ? profit : (currentValue - prevValue); 

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color:var(--text-muted); font-weight:500;">T+${i-1}</td>
                        <td style="font-weight:600;">${currentProjPrice.toFixed(2)}</td>
                        <td>${formatNum(currentValue)}</td>
                        <td class="${getColorClass(dailyProfit)}" style="font-weight:600;">
                            ${dailyProfit > 0 ? '+' : ''}${formatNum(dailyProfit)}
                        </td>
                    `;
                    tbody.appendChild(tr);
                }

            } catch (error) {
                if (!isAuto) alert("获取失败: 请检查网络或股票代码 (需带前缀如 sh600481)");
            } finally {
                if (!isAuto) {
                    btn.innerText = "⚡️ 手动强制刷新";
                    btn.style.opacity = "1";
                }
            }
        }

        loadSavedParams();
        refreshData(false); 
        
        // 依然保留了 5 秒的自动刷新（如有需要可以改回 3000）
        setInterval(() => {
            refreshData(true);
        }, 5000);

    </script>
</body>
</html>
