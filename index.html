<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="私人看板">
    <title>私人持仓推演</title>
    <style>
        :root {
            --bg-color: #f2f2f7; 
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-muted: #8e8e93;
            --red-up: #ff3b30; 
            --green-down: #34c759; 
            --blue-btn: #007aff;
            --separator: #c6c6c8; 
        }

        html, body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; 
            color: var(--text-main); 
            -webkit-tap-highlight-color: transparent;
            min-height: 100dvh; /* 保证背景色铺满全屏 */
        }

        /* 留出顶部刘海和底部小白条的安全距离 */
        .container {
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        /* ====== iOS 设置风格的基础组件 ====== */
        .ios-group-title { margin: 20px 16px 8px 32px; font-size: 13px; color: #6d6d72; text-transform: uppercase; font-weight: 500; display: flex; align-items: center; }
        .ios-group { background: var(--card-bg); border-radius: 12px; margin: 0 16px 20px 16px; overflow: hidden; }
        
        .ios-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; position: relative; background: #fff; }
        .ios-row:not(:last-child)::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 0; height: 0.5px; background-color: var(--separator); }
        .ios-row label { font-size: 16px; color: var(--text-main); font-weight: 400; }
        .ios-row input { text-align: right; font-size: 16px; border: none; outline: none; background: transparent; color: var(--blue-btn); font-weight: 500; width: 140px; }
        
        /* 统计格子样式 */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; border-top: 0.5px solid var(--separator); }
        .grid-item { padding: 14px 16px; position: relative; display: flex; flex-direction: column; justify-content: center; }
        .grid-item:nth-child(odd)::after { content: ''; position: absolute; top: 0; bottom: 0; right: 0; width: 0.5px; background-color: var(--separator); }
        .grid-item:nth-child(1), .grid-item:nth-child(2) { border-bottom: 0.5px solid var(--separator); }
        .grid-item .g-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .grid-item .g-value { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }

        .text-red { color: var(--red-up); }
        .text-green { color: var(--green-down); }
        .bg-red { background-color: var(--red-up); color: white; }
        .bg-green { background-color: var(--green-down); color: white; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: right; }
        th { color: var(--text-muted); font-weight: 400; padding: 12px 16px; border-bottom: 0.5px solid var(--separator); font-size: 12px; }
        td { padding: 12px 16px; border-bottom: 0.5px solid var(--separator); font-variant-numeric: tabular-nums; }
        tr:last-child td { border-bottom: none; }
        th:first-child, td:first-child { text-align: left; }

        .rate-badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 14px; background: #f2f2f7; font-variant-numeric: tabular-nums;}
        .live-dot { width: 8px; height: 8px; background-color: var(--green-down); border-radius: 50%; margin-left: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.6); } 70% { box-shadow: 0 0 0 6px rgba(52, 199, 89, 0); } 100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); } }

    </style>
</head>
<body>
    <div class="container">
        
        <div class="ios-group-title">配置参数</div>
        <div class="ios-group">
            <div class="ios-row">
                <label>股票代码</label>
                <input type="text" id="stockCode" value="sh600481" placeholder="例如 sh600481">
            </div>
            <div class="ios-row">
                <label>初始总成本</label>
                <input type="number" id="cost" value="385000">
            </div>
            <div class="ios-row">
                <label>持仓股数</label>
                <input type="number" id="shares" value="26200">
            </div>
            <div class="ios-row">
                <label>预期日涨幅(%)</label>
                <input type="number" id="dailyGrowth" value="10" step="0.1">
            </div>
        </div>

        <div class="ios-group-title">
            实时看板 <div class="live-dot"></div>
            <span id="profitRate" class="rate-badge" style="margin-left: auto; margin-right: 16px;">--</span>
        </div>
        <div class="ios-group">
            <div class="grid-2">
                <div class="grid-item"><div class="g-label">最新股价</div><div class="g-value" id="currentPrice">--</div></div>
                <div class="grid-item"><div class="g-label">当前市值</div><div class="g-value" id="marketValue">--</div></div>
                <div class="grid-item"><div class="g-label">回本股价</div><div class="g-value" id="breakevenPrice">--</div></div>
                <div class="grid-item"><div class="g-label">浮动盈亏</div><div class="g-value" id="profit">--</div></div>
            </div>
        </div>

        <div class="ios-group-title">T+10 预期推演</div>
        <div class="ios-group">
            <table>
                <thead><tr><th>交易日</th><th>预期股价</th><th>预期市值</th><th>单日浮动</th></tr></thead>
                <tbody id="projectionTable"></tbody>
            </table>
        </div>
        
    </div>

    <script>
        // 格式化数字
        function formatNum(num) { 
            return Number(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); 
        }

        // 本地存储参数
        function saveParams() {
            const params = { 
                code: document.getElementById('stockCode').value.trim(), 
                cost: document.getElementById('cost').value, 
                shares: document.getElementById('shares').value, 
                growth: document.getElementById('dailyGrowth').value 
            };
            localStorage.setItem('stockAppParams', JSON.stringify(params));
            return params;
        }

        function loadSavedParams() {
            const saved = localStorage.getItem('stockAppParams');
            if (saved) {
                const data = JSON.parse(saved);
                if (data.code) document.getElementById('stockCode').value = data.code;
                if (data.cost) document.getElementById('cost').value = data.cost;
                if (data.shares) document.getElementById('shares').value = data.shares;
                if (data.growth) document.getElementById('dailyGrowth').value = data.growth;
            }
        }

        // GBK 编码安全拉取数据
        function fetchSafeData(code) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.charset = 'gbk';
                script.src = `https://qt.gtimg.cn/q=${code}&t=${new Date().getTime()}`;
                
                script.onload = () => {
                    if (window['v_' + code]) resolve(window['v_' + code]);
                    else reject();
                    document.head.removeChild(script);
                };
                script.onerror = () => reject();
                document.head.appendChild(script);
            });
        }

        // 核心刷新逻辑
        async function refreshData() {
            const params = saveParams(); 
            const cost = parseFloat(params.cost); 
            const shares = parseFloat(params.shares); 
            const growthRate = parseFloat(params.growth) / 100; 
            const code = params.code;
            
            if(!code) return;

            try {
                const dataStr = await fetchSafeData(code);
                const parts = dataStr.split('~');
                if (parts.length < 10) return;
                
                const realPrice = parseFloat(parts[3]);
                const marketValue = realPrice * shares; 
                const profit = marketValue - cost; 
                const profitRate = (profit / cost) * 100; 
                const breakevenPrice = cost / shares;
                
                // 更新看板 UI
                document.getElementById('currentPrice').innerText = realPrice.toFixed(2); 
                document.getElementById('breakevenPrice').innerText = breakevenPrice.toFixed(2); 
                document.getElementById('marketValue').innerText = formatNum(marketValue);
                
                const profitEl = document.getElementById('profit'); 
                profitEl.innerText = (profit > 0 ? '+' : '') + formatNum(profit); 
                profitEl.className = 'g-value ' + (profit > 0 ? 'text-red' : (profit < 0 ? 'text-green' : ''));
                
                const rateEl = document.getElementById('profitRate'); 
                rateEl.innerText = (profitRate > 0 ? '+' : '') + profitRate.toFixed(2) + '%'; 
                rateEl.className = 'rate-badge ' + (profitRate > 0 ? 'text-red' : (profitRate < 0 ? 'text-green' : ''));
                if(profitRate > 0) rateEl.style.backgroundColor = 'rgba(255, 59, 48, 0.1)'; 
                else if(profitRate < 0) rateEl.style.backgroundColor = 'rgba(52, 199, 89, 0.1)';

                // 更新表格
                const tbody = document.getElementById('projectionTable'); 
                tbody.innerHTML = ''; 
                let currentProjPrice = realPrice;
                
                for (let i = 1; i <= 10; i++) {
                    let prevValue = currentProjPrice * shares; 
                    if (i > 1) { currentProjPrice = currentProjPrice * (1 + growthRate); }
                    let currentValue = currentProjPrice * shares; 
                    let dailyProfit = i === 1 ? profit : (currentValue - prevValue); 
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>T+${i-1}</td>
                        <td style="font-weight:500;">${currentProjPrice.toFixed(2)}</td>
                        <td>${formatNum(currentValue)}</td>
                        <td class="${dailyProfit > 0 ? 'text-red' : (dailyProfit < 0 ? 'text-green' : '')}" style="font-weight:500;">
                            ${dailyProfit > 0 ? '+' : ''}${formatNum(dailyProfit)}
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            } catch (error) { 
                console.log('拉取数据失败'); 
            }
        }

        // 初始化
        loadSavedParams(); 
        refreshData(); 
        
        // 每 3 秒自动刷新一次
        setInterval(refreshData, 3000);

    </script>
</body>
</html>
